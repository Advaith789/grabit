<div class="dashboard-container">
  <div class="dashboard-header">
    <h2>Inventory Overview</h2>
    <p>Live visualization of available food items.</p>
  </div>

  <div class="chart-card">
    
    <div class="chart-wrapper">
      
      <div class="grid-lines">
        <div class="grid-line"></div>
        <div class="grid-line"></div>
        <div class="grid-line"></div>
        <div class="grid-line"></div>
      </div>

      <div class="chart-content">
        <div *ngFor="let item of inventoryData" class="chart-row">
          
          <div class="y-axis-label">
            <span class="item-name">{{ item.food_item }}</span>
            <span class="rest-name">{{ item.restaurant_name }}</span>
          </div>

          <div class="bar-container">
            <div class="bar" [style.width]="getBarWidth(item.quantity)">
              <span class="bar-value" [class.outside]="item.quantity < (maxQuantity * 0.1)">
                {{ item.quantity }}
              </span>
            </div>
          </div>

        </div>
      </div>

    </div>

    <div *ngIf="inventoryData.length === 0" class="empty-state">
      Loading visualization data...
    </div>

  </div>
</div>
